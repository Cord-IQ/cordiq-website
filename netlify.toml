[build]
  command = "npm run build"
  publish = "dist"

# Force www → apex (cordiq.xyz) so there is one canonical host
[[redirects]]
  from = "https://www.cordiq.xyz/*"
  to = "https://cordiq.xyz/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively (Astro fingerprints them)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
